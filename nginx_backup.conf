server
{
    listen 80;
    listen 443 ssl http2 ;
    server_name inside.tsol.vn;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/inside.tsol.vn/tsolapp;
    include /www/server/panel/vhost/nginx/extension/inside.tsol.vn/*.conf;

    #SSL-START SSL related configuration
    ssl_certificate    /www/server/panel/vhost/cert/inside.tsol.vn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/inside.tsol.vn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START  Error page configuration
    error_page 404 /404.html;
    error_page 502 /502.html;
    #ERROR-PAGE-END

    #REWRITE-START URL rewrite rule reference
    include /www/server/panel/vhost/rewrite/inside.tsol.vn.conf;
    #REWRITE-END

    # Next.js Reverse Proxy
    location / {
        proxy_pass http://127.0.0.1:6688;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forbidden files or directories
    location ~ ^/(\.(user.ini|htaccess|git|env|svn|project)|LICENSE|README.md)
    {
        return 404;
    }

    # Directory verification related settings for one-click application for SSL certificate
    location ~ \.well-known{
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    access_log  /www/wwwlogs/inside.tsol.vn.log;
    error_log  /www/wwwlogs/inside.tsol.vn.error.log;
}
